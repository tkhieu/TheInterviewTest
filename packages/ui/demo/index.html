<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>@campaign-manager/ui — Demo Gallery</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>
  tailwind.config = {
    darkMode: ['class', '[data-theme="dark"]'],
    theme: {
      extend: {
        fontFamily: { sans: ['Inter','ui-sans-serif','system-ui'], mono: ['"JetBrains Mono"','ui-monospace','monospace'] },
        colors: {
          bg: 'rgb(var(--cm-bg) / <alpha-value>)',
          surface: 'rgb(var(--cm-surface) / <alpha-value>)',
          'surface-2': 'rgb(var(--cm-surface-2) / <alpha-value>)',
          border: 'rgb(var(--cm-border) / <alpha-value>)',
          ring: 'rgb(var(--cm-ring) / <alpha-value>)',
          fg: 'rgb(var(--cm-fg) / <alpha-value>)',
          'fg-muted': 'rgb(var(--cm-fg-muted) / <alpha-value>)',
          'fg-subtle': 'rgb(var(--cm-fg-subtle) / <alpha-value>)',
          accent: 'rgb(var(--cm-accent) / <alpha-value>)',
          'accent-fg': 'rgb(var(--cm-accent-fg) / <alpha-value>)',
          'status-draft': 'rgb(var(--cm-draft) / <alpha-value>)',
          'status-scheduled': 'rgb(var(--cm-scheduled) / <alpha-value>)',
          'status-sending': 'rgb(var(--cm-sending) / <alpha-value>)',
          'status-sent': 'rgb(var(--cm-sent) / <alpha-value>)',
          'status-failed': 'rgb(var(--cm-failed) / <alpha-value>)',
        },
        keyframes: {
          'soft-pulse': { '0%,100%': { opacity:'1', transform:'scale(1)' }, '50%': { opacity:'.55', transform:'scale(.85)' } },
        },
        animation: { 'soft-pulse': 'soft-pulse 1.4s ease-in-out infinite' },
        boxShadow: {
          soft: '0 1px 2px 0 rgb(15 23 42 / 0.04), 0 1px 3px 0 rgb(15 23 42 / 0.06)',
          pop: '0 6px 16px -6px rgb(15 23 42 / 0.12), 0 2px 4px -2px rgb(15 23 42 / 0.06)',
        },
      },
    },
  };
</script>
<style>
:root, [data-theme="light"] {
  --cm-bg: 255 255 255; --cm-surface: 255 255 255; --cm-surface-2: 248 250 252;
  --cm-border: 226 232 240; --cm-ring: 79 70 229;
  --cm-fg: 15 23 42; --cm-fg-muted: 71 85 105; --cm-fg-subtle: 100 116 139;
  --cm-accent: 79 70 229; --cm-accent-fg: 255 255 255;
  --cm-draft: 100 116 139; --cm-scheduled: 37 99 235; --cm-sending: 245 158 11; --cm-sent: 5 150 105; --cm-failed: 244 63 94;
}
[data-theme="dark"] {
  --cm-bg: 9 9 11; --cm-surface: 24 24 27; --cm-surface-2: 39 39 42;
  --cm-border: 39 39 42; --cm-ring: 129 140 248;
  --cm-fg: 244 244 245; --cm-fg-muted: 161 161 170; --cm-fg-subtle: 113 113 122;
  --cm-accent: 99 102 241; --cm-accent-fg: 255 255 255;
  --cm-draft: 161 161 170; --cm-scheduled: 96 165 250; --cm-sending: 251 191 36; --cm-sent: 52 211 153; --cm-failed: 251 113 133;
}
html, body { font-family: Inter, ui-sans-serif, system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: rgb(var(--cm-bg)); color: rgb(var(--cm-fg)); }
.tt { position: relative; }
.tt:hover .tt-body, .tt:focus-within .tt-body { opacity: 1; transform: translate(-50%, -4px); pointer-events: auto; }
.tt-body { position: absolute; left: 50%; bottom: 100%; transform: translate(-50%, 0); background: rgb(var(--cm-fg)); color: rgb(var(--cm-bg)); font-size: 11.5px; padding: 6px 8px; border-radius: 6px; white-space: nowrap; opacity: 0; transition: all 120ms ease; pointer-events: none; box-shadow: 0 4px 12px rgb(15 23 42/.18); z-index: 50; }
.tt-body::after { content: ""; position: absolute; left: 50%; top: 100%; transform: translateX(-50%); border: 4px solid transparent; border-top-color: rgb(var(--cm-fg)); }
details > summary { list-style: none; cursor: pointer; }
details > summary::-webkit-details-marker { display: none; }
details[open] .chev { transform: rotate(180deg); }
.chev { transition: transform 150ms ease; }
@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 0.8s linear infinite; }
</style>
</head>
<body>
<div id="root"></div>

<!-- Inline icons (subset of lucide for the demo) -->
<script type="text/babel" data-presets="env,react">
const Icon = ({ d, size = 16, className = "", strokeWidth = 2, children }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
    {children || <path d={d}/>}

);
const I = {
  Send:        (p) => <Icon {...p}><path d="M22 2 11 13"/><path d="M22 2 15 22 11 13 2 9z"/></Icon>,
  Plus:        (p) => <Icon {...p}><path d="M12 5v14"/><path d="M5 12h14"/></Icon>,
  Trash:       (p) => <Icon {...p}><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></Icon>,
  Calendar:    (p) => <Icon {...p}><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/><path d="M12 14v4"/><path d="M10 16h4"/></Icon>,

  MailOpen:    (p) => <Icon {...p}><path d="M21 8a2 2 0 0 0-1-1.7l-7.5-4.7a2 2 0 0 0-2 0L3 6.3A2 2 0 0 0 2 8v11a2 2 0 0 0 2 2h15a2 2 0 0 0 2-2z"/><path d="m22 8-9.5 5.7a2 2 0 0 1-2 0L2 8"/></Icon>,
  Search:      (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></Icon>,
  Bell:        (p) => <Icon {...p}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></Icon>,

  ChevRight:   (p) => <Icon {...p}><path d="m9 18 6-6-6-6"/></Icon>,
  ChevLeft:    (p) => <Icon {...p}><path d="m15 18-6-6 6-6"/></Icon>,
  X:           (p) => <Icon {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>,
  Alert:       (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></Icon>,
  Info:        (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></Icon>,
  Users:       (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>,
  Check:       (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Icon>,
  AlertTri:    (p) => <Icon {...p}><path d="M21.7 18 13.7 4a2 2 0 0 0-3.4 0L2.3 18a2 2 0 0 0 1.7 3h16a2 2 0 0 0 1.7-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></Icon>,
  More:        (p) => <Icon {...p}><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></Icon>,
  Pencil:      (p) => <Icon {...p}><path d="M21.2 5.9a2.4 2.4 0 0 0-3.4-3.4L3 17.4V21h3.6z"/><path d="m15 5 4 4"/></Icon>,
  Copy:        (p) => <Icon {...p}><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></Icon>,
  Activity:    (p) => <Icon {...p}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></Icon>,
  Sun:         (p) => <Icon {...p}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></Icon>,
  Moon:        (p) => <Icon {...p}><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></Icon>,
  Loader:      (p) => <Icon {...p} className={"spin " + (p.className||"")}><path d="M21 12a9 9 0 1 1-6.2-8.55"/></Icon>,
  Inbox:       (p) => <Icon {...p}><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.5 5.7 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.5-6.3A2 2 0 0 0 16.8 4H7.2a2 2 0 0 0-1.7 1.7Z"/></Icon>,

  Clock:       (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></Icon>,

window.I = I;

<!-- Inline component library (mirrors src/components, simplified for browser demo) -->
<script type="text/babel" data-presets="env,react">
const { useState, useRef, useEffect, useId, useMemo, forwardRef } = React;
const cn = (...args) => args.filter(Boolean).join(' ');
window.cn = cn;

// ---------- StatusBadge ----------
const STATUS_STYLES = {
  draft:     { pill: 'bg-slate-100 text-slate-700 dark:bg-zinc-800 dark:text-zinc-300', dot: 'bg-status-draft', label: 'Draft' },
  scheduled: { pill: 'bg-blue-50 text-blue-700 dark:bg-blue-950/50 dark:text-blue-300', dot: 'bg-status-scheduled', label: 'Scheduled' },
  sending:   { pill: 'bg-amber-50 text-amber-700 dark:bg-amber-950/50 dark:text-amber-300', dot: 'bg-status-sending animate-soft-pulse', label: 'Sending' },
  sent:      { pill: 'bg-emerald-50 text-emerald-700 dark:bg-emerald-950/50 dark:text-emerald-300', dot: 'bg-status-sent', label: 'Sent' },
  failed:    { pill: 'bg-rose-50 text-rose-700 dark:bg-rose-950/50 dark:text-rose-300', dot: 'bg-status-failed', label: 'Failed' },
};
const StatusBadge = ({ status, label, className }) => {
  const s = STATUS_STYLES[status];
  return (
    <span className={cn('inline-flex items-center gap-1.5 rounded-full px-2.5 py-0.5 text-xs font-medium leading-5', s.pill, className)}>
      <span className={cn('h-1.5 w-1.5 rounded-full', s.dot)} aria-hidden />
      {label ?? s.label}
    </span>
  );
};

// ---------- ActionButton ----------
const btnVariants = {
  primary: 'bg-accent text-accent-fg shadow-soft hover:bg-indigo-700 dark:hover:bg-indigo-400 disabled:bg-surface-2 disabled:text-fg-subtle disabled:shadow-none',
  secondary: 'bg-surface text-fg border border-border hover:bg-surface-2 disabled:text-fg-subtle',
  destructive: 'bg-surface text-rose-700 border border-rose-200 hover:bg-rose-50 dark:bg-transparent dark:text-rose-400 dark:border-rose-900/50 dark:hover:bg-rose-950/30',
  ghost: 'bg-transparent text-fg hover:bg-surface-2',
};
const btnSizes = { sm: 'h-8 px-2.5 text-[12.5px]', md: 'h-9 px-3.5 text-sm', lg: 'h-10 px-4 text-sm', icon: 'h-9 w-9' };
const ActionButton = ({ variant='primary', size='md', loading, disabled, iconLeft, iconRight, children, className, ...props }) => (
  <button
    className={cn('inline-flex items-center justify-center gap-1.5 whitespace-nowrap rounded-md font-medium transition-all duration-150 hover:-translate-y-px focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring/40 disabled:cursor-not-allowed disabled:hover:translate-y-0',
      btnVariants[variant], btnSizes[size], className)}
    disabled={disabled || loading}
    aria-busy={loading || undefined}
    {...props}
  >
    {loading ? <I.Loader size={14}/> : iconLeft}
    {children}
    {!loading && iconRight}
  </button>
);

// ---------- ProgressBar ----------
const ProgressBar = ({ label, value, total, tone='accent', helper, size='md', showCount=true, className }) => {
  const safeTotal = Math.max(total, 0);
  const safeValue = Math.min(Math.max(value, 0), safeTotal);
  const pct = safeTotal === 0 ? 0 : Math.round((safeValue / safeTotal) * 100);
  const heights = { sm: 'h-1.5', md: 'h-2', lg: 'h-2.5' };
  const tones = { accent: 'bg-accent', success: 'bg-status-sent', warning: 'bg-status-sending', danger: 'bg-status-failed' };
  return (
    <div className={cn('w-full', className)}>
      {(label !== undefined || showCount) && (
        <div className="flex items-baseline justify-between mb-1.5">
          {label !== undefined && <div className="text-[13px] text-fg">{label}</div>}
          {showCount && (
            <div className="text-[12px] text-fg-subtle tabular-nums">
              <span className="font-medium text-fg">{pct}%</span>
              <span> · {safeValue.toLocaleString()} / {safeTotal.toLocaleString()}</span>
            </div>
          )}
        </div>
      )}
      <div className={cn('relative w-full overflow-hidden rounded-full bg-surface-2', heights[size])}>
        <div className={cn('h-full transition-[width] duration-500 ease-out', tones[tone])} style={{ width: `${pct}%` }} />
      </div>
      {helper && <div className="text-[12px] text-fg-subtle mt-1.5">{helper}</div>}
    </div>
  );
};

// ---------- EmptyState ----------
const EmptyState = ({ icon: Ic = I.Inbox, title, description, cta, action, compact, className }) => (
  <div className={cn('flex flex-col items-center text-center rounded-lg border border-border bg-surface', compact ? 'p-6' : 'p-12', className)}>
    <div className={cn('rounded-full bg-surface-2 flex items-center justify-center mb-3', compact ? 'h-10 w-10' : 'h-14 w-14')}>
      <Ic size={compact ? 20 : 24} className="text-fg-subtle"/>
    </div>
    <div className={cn('font-semibold text-fg', compact ? 'text-sm' : 'text-[15px]')}>{title}</div>
    {description && <div className={cn('text-fg-subtle mt-1 max-w-sm', compact ? 'text-xs' : 'text-[13px]')}>{description}</div>}
    {action ? <div className="mt-4">{action}</div> :
     cta ? <div className="mt-5"><ActionButton onClick={cta.onClick} iconLeft={cta.iconLeft}>{cta.label}</ActionButton></div> : null}
  </div>
);

// ---------- Input / Textarea ----------
const Input = ({ label, error, helper, counter, leftSlot, className, id, ...props }) => {
  const reactId = useId();
  const fieldId = id ?? reactId;
  return (
    <div className="w-full">
      {(label || counter) && (
        <div className="flex items-baseline justify-between">
          {label && <label htmlFor={fieldId} className="text-[13px] font-medium text-fg block mb-1.5">{label}</label>}
          {counter && <span className={cn('text-[12px] tabular-nums', error ? 'text-rose-600' : 'text-fg-subtle')}>{counter}</span>}
        </div>
      )}
      <div className="relative">
        {leftSlot && <div className="absolute left-3 top-1/2 -translate-y-1/2 text-fg-subtle pointer-events-none">{leftSlot}</div>}
        <input
          id={fieldId}
          aria-invalid={error || undefined}
          className={cn('w-full h-9 px-3 text-sm bg-surface text-fg border border-border rounded-md transition-colors placeholder:text-fg-subtle focus:outline-none focus:border-ring focus:ring-2 focus:ring-ring/20 disabled:opacity-60',
            leftSlot && 'pl-9',
            error && 'border-rose-500 focus:border-rose-500 focus:ring-rose-500/20',
            className)}
          {...props}
        />
      </div>
      {helper && (
        <div className={cn('mt-1.5 text-[12px] flex items-start gap-1.5', error ? 'text-rose-600' : 'text-fg-subtle')}>
          {error && <I.Alert size={14} className="mt-px shrink-0"/>}
          <span>{helper}</span>
        </div>
      )}
    </div>
  );
};
const Textarea = ({ label, error, helper, mono, className, id, ...props }) => {
  const reactId = useId();
  const fieldId = id ?? reactId;
  return (
    <div className="w-full">
      {label && <label htmlFor={fieldId} className="text-[13px] font-medium text-fg block mb-1.5">{label}</label>}
      <textarea
        id={fieldId}
        className={cn('w-full px-3 py-2.5 text-sm bg-surface text-fg border border-border rounded-md leading-relaxed focus:outline-none focus:border-ring focus:ring-2 focus:ring-ring/20',
          mono && 'font-mono text-[13px]',
          error && 'border-rose-500 focus:border-rose-500 focus:ring-rose-500/20',
          className)}
        {...props}
      />
      {helper && <div className={cn('mt-1.5 text-[12px]', error ? 'text-rose-600' : 'text-fg-subtle')}>{helper}</div>}
    </div>
  );
};

// ---------- Chip ----------
const Chip = ({ active, count, children, className, ...props }) => (
  <button
    type="button"
    aria-pressed={active}
    className={cn('inline-flex items-center gap-1.5 h-8 px-2.5 rounded-md border text-[13px] transition-colors',
      active ? 'bg-fg text-bg border-fg' : 'bg-surface text-fg-muted border-border hover:bg-surface-2',
      className)}
    {...props}
  >
    <span>{children}</span>
    {count !== undefined && <span className={cn('tabular-nums text-[12px]', active ? 'text-bg/70' : 'text-fg-subtle')}>{count}</span>}
  </button>
);

// ---------- StatCard ----------
const buildPath = (series, w=120, h=28) => {
  if (!series.length) return { line:'', area:'' };
  const min = Math.min(...series), max = Math.max(...series), range = max - min || 1;
  const step = w / Math.max(series.length-1, 1);
  const pts = series.map((v,i) => [i*step, h-2 - ((v-min)/range)*(h-4)]);
  const line = pts.map(([x,y],i) => `${i===0?'M':'L'}${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
  const area = `M${pts[0][0]},${h} ` + pts.map(([x,y])=>`L${x.toFixed(1)},${y.toFixed(1)}`).join(' ') + ` L${w},${h} Z`;
  return { line, area };
};
const StatCard = ({ label, value, icon: Ic, iconClassName, series, seriesColor='rgb(var(--cm-accent))', footer, className }) => {
  const { line, area } = useMemo(() => buildPath(series ?? []), [series]);
  return (
    <div className={cn('border border-border rounded-lg p-5 bg-surface shadow-soft', className)}>
      <div className="flex items-center justify-between">
        <div className="text-[12px] uppercase tracking-wider text-fg-subtle font-medium">{label}</div>
        {Ic && <Ic size={16} className={cn('text-fg-subtle', iconClassName)}/>}
      </div>
      <div className="text-[30px] font-semibold tracking-[-0.022em] tabular-nums mt-1 text-fg leading-tight">{value}</div>
      {series && series.length > 1 && (
        <svg className="mt-2 w-full" viewBox="0 0 120 28" preserveAspectRatio="none" height="28">
          <path d={area} fill={seriesColor} fillOpacity={0.08}/>
          <path d={line} fill="none" stroke={seriesColor} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {footer && <div className="text-[11.5px] text-fg-subtle mt-1">{footer}</div>}
    </div>
  );
};

// ---------- Tooltip (CSS-only for demo; real lib uses Radix) ----------
const Tooltip = ({ content, children }) => (
  <span className="tt inline-flex">
    {children}
    <span className="tt-body">{content}</span>
  </span>
);

// ---------- Accordion (CSS <details> for demo; real lib uses Radix) ----------
const Accordion = ({ trigger, children }) => (
  <details className="border border-border rounded-lg bg-surface shadow-soft overflow-hidden">
    <summary className="flex items-center justify-between px-5 py-4 hover:bg-surface-2">
      <div className="flex items-center gap-2.5"><I.FileText size={16} className="text-fg-subtle"/><span className="text-[14px] font-medium text-fg">{trigger}</span></div>
      <I.ChevDown size={16} className="chev text-fg-subtle"/>
    </summary>
    <div className="px-5 pb-5 pt-0 border-t border-border">{children}</div>
  </details>
);

// ---------- Avatar ----------
const initials = (name) => name.split(/\s+/).filter(Boolean).slice(0,2).map(p => p[0].toUpperCase()).join('');
const Avatar = ({ name, src, size='md', className }) => {
  const [errored, setErrored] = useState(false);
  const sizes = { sm: 'h-6 w-6 text-[10px]', md: 'h-7 w-7 text-[12px]', lg: 'h-9 w-9 text-[13px]' };
  return (
    <div role="img" aria-label={name} className={cn('inline-flex items-center justify-center rounded-full font-semibold overflow-hidden bg-indigo-100 text-indigo-700 dark:bg-indigo-950/40 dark:text-indigo-300', sizes[size], className)}>
      {src && !errored ? <img src={src} alt="" className="h-full w-full object-cover" onError={()=>setErrored(true)}/> : initials(name)}
    </div>
  );
};

// ---------- TopBar ----------

// ---------- RecipientTagInput ----------
const isEmail = (s) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s);
const RecipientTagInput = ({ value, onChange, placeholder='Paste more emails…', showCounter=true, className }) => {
  const [draft, setDraft] = useState('');
  const inputRef = useRef(null);
  const validate = isEmail;
  const commit = (raw) => {
    const items = raw.split(/[\s,;]+/).map(s => s.trim()).filter(Boolean);
    if (!items.length) return;
    onChange(Array.from(new Set([...value, ...items])));
    setDraft('');
  };
  const remove = (i) => onChange(value.filter((_, idx) => idx !== i));
  const onKey = (e) => {
    if (e.key === 'Enter' || e.key === ',' || e.key === ';') { e.preventDefault(); if (draft.trim()) commit(draft); }
    else if (e.key === 'Backspace' && draft === '' && value.length) { e.preventDefault(); remove(value.length - 1); }
  };
  const onPaste = (e) => {
    const text = e.clipboardData.getData('text');
    if (/[\s,;]/.test(text)) { e.preventDefault(); commit(text); }
  };
  const valid = value.filter(validate).length;
  const invalid = value.length - valid;
  return (
    <div className={className}>
      <div
        className="border border-border rounded-md bg-surface px-2 py-1.5 min-h-[88px] flex flex-wrap gap-1.5 items-start cursor-text focus-within:border-ring focus-within:ring-2 focus-within:ring-ring/20"
        onClick={() => inputRef.current?.focus()}
      >
        {value.map((em, i) => {
          const ok = validate(em);
          return (
            <span key={`${em}-${i}`} className={cn('inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[12.5px] leading-5',
              ok ? 'bg-surface-2 text-fg' : 'bg-rose-50 text-rose-700 ring-1 ring-rose-200 dark:bg-rose-950/40 dark:ring-rose-900/40 dark:text-rose-300')}>
              {!ok && <I.Alert size={12} className="shrink-0"/>}
              <span className="max-w-[240px] truncate">{em}</span>
              <button type="button" onClick={(e)=>{e.stopPropagation(); remove(i);}} className="text-fg-subtle hover:text-fg shrink-0" aria-label={`Remove ${em}`}><I.X size={12}/></button>
            </span>
          );
        })}
        <input ref={inputRef} value={draft} onChange={(e)=>setDraft(e.target.value)} onKeyDown={onKey} onPaste={onPaste} onBlur={()=>draft.trim()&&commit(draft)} placeholder={value.length===0 ? placeholder : ''} className="flex-1 min-w-[120px] outline-none text-[13px] px-1.5 py-1 bg-transparent text-fg placeholder:text-fg-subtle"/>
      </div>
      {showCounter && (
        <div className="mt-1.5 text-[12px] text-fg-subtle tabular-nums">
          {valid} valid{invalid > 0 && <span className="text-rose-600"> · {invalid} invalid</span>}
        </div>
      )}
    </div>
  );
};

          <Accordion trigger="Body preview · Don't miss this — your early access begins tomorrow at 9am">
            <pre className="whitespace-pre-wrap font-sans text-[13.5px] leading-relaxed text-fg-muted mt-3">{`Hi {{first_name}},

Spring Launch starts tomorrow at 9am PT — and as a top-100 customer, you get a 12-hour head start.

→ Reserve early access`}</pre>
          </Accordion>
        </Card>
      </Section>

      {/* RecipientTagInput */}
      <Section id="tag" eyebrow="Form · 10" title="RecipientTagInput" subtitle="Paste comma-, space- or newline-separated emails. Invalid entries pill in red. Backspace on empty input deletes the last tag.">
        <Card title="Live demo" snippet="<RecipientTagInput value onChange validate />">
          <div className="max-w-2xl">
            <RecipientTagInput value={emails} onChange={setEmails}/>
            <div className="mt-3 text-[12px] text-fg-subtle">Try pasting <code className="font-mono bg-surface-2 px-1 py-0.5 rounded">a@x.com, b@y.com, not-an-email</code></div>
          </div>
        </Card>
      </Section>

      {/* Avatar */}
      <Section id="avatar" eyebrow="Primitive · 11" title="Avatar" subtitle="Circular avatar with initials fallback. Indigo accent matches the brand.">
        <Card title="Sizes" snippet='size="sm | md | lg"'>
          <div className="flex items-center gap-3">
            <Avatar name="Amelia Chen" size="sm"/>
            <Avatar name="Marco Del Rosario" size="md"/>
            <Avatar name="Linnéa Holm" size="lg"/>
            <Avatar name="Mai Nguyen" size="lg"/>
            <Avatar name="Priya Shah" size="lg"/>
          </div>
        </Card>
      </Section>

      {/* TopBar */}
      <Section id="topbar" eyebrow="Layout · 12" title="TopBar" subtitle="App-level navigation. Sticky-ready (caller decides position).">
        <Card title="Default" snippet="<TopBar appName nav user />">
          <TopBar
            appName="Campaign Manager"
            nav={[{ label: 'Campaigns', active: true }, { label: 'Recipients' }]}
            user={{ name: 'Mai N.' }}
            onSearchClick={()=>{}}
            onNotificationsClick={()=>{}}
            className="rounded-lg border"
          />
        </Card>
      </Section>

      {/* CampaignTable */}
      <Section id="table" eyebrow="Composite · 13" title="CampaignTable" subtitle="Dense list table — composes StatusBadge + the inline sent-rate bar. Filter chips above drive this live.">
        <Card title="Live · filtered" snippet="<CampaignTable campaigns onRowClick />">
          {tableData.length === 0 ? (
            <EmptyState compact icon={I.Inbox} title="No campaigns match" description="Try clearing the filter above." cta={{ label: 'Clear filter', onClick: () => setFilter('all') }}/>
          ) : (
            <CampaignTable campaigns={tableData}/>
          )}
        </Card>
      </Section>

      {/* Footer */}
      <footer className="py-8">
        <div className="max-w-[1280px] mx-auto px-8 flex items-center justify-between text-[12px] text-fg-subtle">
          <div>@campaign-manager/ui v0.1.0 · 13 components · light + dark</div>
          <div className="font-mono">npm run storybook · for full controls</div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
