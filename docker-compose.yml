services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-campaign}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campaign}
      POSTGRES_DB: ${POSTGRES_DB:-campaign_manager}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-campaign} -d ${POSTGRES_DB:-campaign_manager}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - db-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: on-failure:3
    # `links` injects an /etc/hosts entry for `db` -> its container IP, bypassing
    # Docker's embedded DNS at 127.0.0.11. Required for environments where the
    # embedded resolver is intermittent (WSL2 most commonly). Linux nsswitch
    # defaults to `hosts: files dns`, so /etc/hosts wins and DNS is never queried
    # for `db`. Officially deprecated in Compose v2 but the implementation
    # still runs and is the canonical escape hatch for this case.
    links:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://campaign:campaign@db:5432/campaign_manager}
      API_PORT: ${API_PORT:-4000}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-min-32-chars-long-please}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
